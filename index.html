<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Jatin Aggarwal - Software Developer specializing in Python, Automation Engineering, Data Pipelines, and Financial Systems Optimization.">
    <title>Jatin Aggarwal | Portfolio & Engineering Hub</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-base: #030712;
            --bg-surface: #0b1329;
            --bg-card: #111d3a;
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --accent-glow: #38bdf8;
            --accent-purple: #818cf8;
            --accent-emerald: #34d399;
            --border: rgba(56, 189, 248, 0.15);
            --gradient-primary: linear-gradient(135deg, #38bdf8 0%, #818cf8 100%);
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-primary);
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* Ambient Glow Backgrounds */
        .ambient-glow {
            position: fixed;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.1) 0%, rgba(0,0,0,0) 70%);
            top: -100px;
            left: -100px;
            z-index: -1;
            pointer-events: none;
            animation: floatGlow 10s infinite alternate ease-in-out;
        }

        .ambient-glow-2 {
            position: fixed;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(129, 140, 248, 0.08) 0%, rgba(0,0,0,0) 70%);
            bottom: -100px;
            right: -100px;
            z-index: -1;
            pointer-events: none;
            animation: floatGlow 12s infinite alternate-reverse ease-in-out;
        }

        @keyframes floatGlow {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 40px) scale(1.1); }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-base);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--bg-card);
            border-radius: 4px;
            border: 1px solid var(--border);
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-glow);
        }

        /* Dynamic Layout Wrapper */
        .app-container {
            display: grid;
            grid-template-columns: 320px 1fr;
            min-height: 100vh;
            max-width: 1500px;
            margin: 0 auto;
            position: relative;
        }

        /* Sidebar Profile Column */
        aside {
            background-color: var(--bg-surface);
            border-right: 1px solid var(--border);
            padding: 3rem 2rem;
            position: sticky;
            top: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            z-index: 10;
        }

        .profile-card {
            text-align: center;
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 24px;
            background: var(--gradient-primary);
            margin: 0 auto 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--bg-base);
            box-shadow: 0 10px 30px rgba(56, 189, 248, 0.3);
            position: relative;
        }

        .profile-avatar::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 28px;
            border: 1px solid var(--accent-glow);
            opacity: 0.5;
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            margin-bottom: 0.5rem;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .profile-title {
            font-size: 0.9rem;
            color: var(--text-secondary);
            font-weight: 500;
            margin-bottom: 2rem;
            line-height: 1.4;
        }

        /* Sidebar Navigation Links */
        .side-nav {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-bottom: 2rem;
        }

        .side-nav-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.75rem 1rem;
            color: var(--text-secondary);
            text-decoration: none;
            border-radius: 10px;
            font-weight: 500;
            font-size: 0.95rem;
            transition: var(--transition);
            border: 1px solid transparent;
        }

        .side-nav-item i {
            width: 20px;
            font-size: 1.1rem;
            transition: var(--transition);
        }

        .side-nav-item:hover, .side-nav-item.active {
            color: var(--text-primary);
            background-color: rgba(56, 189, 248, 0.05);
            border-color: rgba(56, 189, 248, 0.1);
            transform: translateX(4px);
        }

        .side-nav-item:hover i, .side-nav-item.active i {
            color: var(--accent-glow);
            transform: scale(1.1);
        }

        /* Contact Details Panel */
        .sidebar-contact {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .contact-row {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-decoration: none;
            transition: var(--transition);
        }

        .contact-row:hover {
            color: var(--accent-glow);
        }

        .contact-row i {
            color: var(--accent-purple);
            font-size: 1rem;
        }

        /* Main Scrollable Canvas Content */
        main {
            padding: 3rem 4rem;
            max-height: 100vh;
            overflow-y: auto;
        }

        section {
            margin-bottom: 5rem;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.6s forwards cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        section:nth-child(1) { animation-delay: 0.1s; }
        section:nth-child(2) { animation-delay: 0.2s; }
        section:nth-child(3) { animation-delay: 0.3s; }
        section:nth-child(4) { animation-delay: 0.4s; }

        .section-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2.5rem;
        }

        .section-header h2 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .section-header .line {
            flex-grow: 1;
            height: 1px;
            background: linear-gradient(90deg, var(--border) 0%, rgba(0,0,0,0) 100%);
        }

        /* Summary Segment Card */
        .summary-box {
            background-color: var(--bg-surface);
            border: 1px solid var(--border);
            padding: 2rem;
            border-radius: 16px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
        }

        .summary-box::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 4px; height: 100%;
            background: var(--gradient-primary);
        }

        .summary-box p {
            color: var(--text-secondary);
            font-size: 1.05rem;
            line-height: 1.7;
        }

        /* Interactive Grid Layout for Skills */
        .skills-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .skills-category {
            background: var(--bg-surface);
            border: 1px solid rgba(255, 255, 255, 0.03);
            padding: 1.5rem;
            border-radius: 14px;
            transition: var(--transition);
        }

        .skills-category:hover {
            border-color: var(--border);
            background: var(--bg-card);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .skills-category h3 {
            font-size: 1rem;
            color: var(--accent-glow);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .tags-wrapper {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
        }

        .skill-tag {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: var(--text-primary);
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 500;
            transition: var(--transition);
        }

        .skills-category:hover .skill-tag {
            background: rgba(56, 189, 248, 0.03);
            border-color: rgba(56, 189, 248, 0.15);
        }

        .skill-tag:hover {
            background: var(--gradient-primary) !important;
            color: var(--bg-base) !important;
            border-color: transparent !important;
            transform: translateY(-1px);
        }

        /* Timeline Components (Experience) */
        .timeline {
            position: relative;
            padding-left: 2rem;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 5px; top: 0; width: 2px; height: 100%;
            background: linear-gradient(180deg, var(--accent-glow) 0%, var(--accent-purple) 50%, rgba(0,0,0,0) 100%);
            opacity: 0.3;
        }

        .timeline-block {
            position: relative;
            margin-bottom: 3rem;
        }

        .timeline-node {
            content: '';
            position: absolute;
            left: -31px; top: 6px;
            width: 12px; height: 12px;
            border-radius: 50%;
            background-color: var(--bg-base);
            border: 2px solid var(--accent-glow);
            transition: var(--transition);
            z-index: 2;
        }

        .timeline-block:hover .timeline-node {
            background-color: var(--accent-glow);
            box-shadow: 0 0 12px var(--accent-glow);
            transform: scale(1.2);
        }

        .timeline-card {
            background: var(--bg-surface);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 2rem;
            transition: var(--transition);
        }

        .timeline-block:hover .timeline-card {
            border-color: var(--border);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            background: var(--bg-card);
        }

        .timeline-meta {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1.25rem;
        }

        .job-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .company-badge {
            color: var(--accent-glow);
            font-weight: 600;
            font-size: 0.95rem;
            margin-top: 0.25rem;
        }

        .job-duration {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.85rem;
            color: var(--text-secondary);
            background: rgba(255, 255, 255, 0.04);
            padding: 0.3rem 0.75rem;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .timeline-card ul {
            list-style: none;
        }

        .timeline-card ul li {
            position: relative;
            padding-left: 1.5rem;
            margin-bottom: 0.75rem;
            font-size: 0.95rem;
            color: var(--text-secondary);
        }

        .timeline-card ul li strong {
            color: var(--text-primary);
        }

        .timeline-card ul li::before {
            content: "→";
            position: absolute;
            left: 0;
            color: var(--accent-purple);
            font-weight: bold;
        }

        /* Projects Presentation Deck Layout */
        .projects-deck {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 2rem;
        }

        .project-card {
            background: var(--bg-surface);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: var(--transition);
            position: relative;
        }

        .project-card:hover {
            border-color: var(--border);
            transform: translateY(-4px);
            background: var(--bg-card);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .project-top h3 {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .project-links {
            display: flex;
            gap: 0.75rem;
        }

        .project-links a {
            font-size: 0.95rem;
            color: var(--text-secondary);
            text-decoration: none;
            transition: var(--transition);
            background: rgba(255, 255, 255, 0.04);
            padding: 0.3rem 0.6rem;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .project-links a:hover {
            color: var(--accent-glow);
            border-color: var(--accent-glow);
            background: rgba(56, 189, 248, 0.05);
        }

        .project-stack {
            font-size: 0.8rem;
            color: var(--accent-purple);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 1.25rem;
        }

        .project-card ul {
            list-style: none;
            margin-bottom: 1.5rem;
        }

        .project-card ul li {
            position: relative;
            padding-left: 1.25rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .project-card ul li strong {
            color: var(--text-primary);
        }

        .project-card ul li::before {
            content: "•";
            position: absolute;
            left: 0;
            color: var(--accent-glow);
            font-weight: bold;
        }

        /* Achievements/Footer Enhancements Grid */
        .grid-two-col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        .list-card {
            background: var(--bg-surface);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 2rem;
        }

        .list-card ul {
            list-style: none;
        }

        .list-card ul li {
            position: relative;
            padding-left: 1.75rem;
            margin-bottom: 1rem;
            font-size: 0.95rem;
            color: var(--text-secondary);
        }

        .list-card ul li i {
            position: absolute;
            left: 0; top: 4px;
            color: var(--accent-emerald);
        }

        .list-card ul li strong {
            color: var(--text-primary);
        }

        /* Responsive Breakpoints Adaptability */
        @media (max-width: 1024px) {
            .app-container {
                grid-template-columns: 1fr;
            }
            aside {
                position: relative;
                height: auto;
                border-right: none;
                border-bottom: 1px solid var(--border);
                padding: 2rem;
            }
            .side-nav {
                display: none; /* Hide sticky tracking nav on standard mobile stacks */
            }
            main {
                padding: 2.5rem 1.5rem;
                max-height: none;
                overflow-y: visible;
            }
            .grid-two-col {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
